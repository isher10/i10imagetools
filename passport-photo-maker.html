<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Passport Photo Maker</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* Header */

.header{
background:#5a66a5;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

/* Container */

.container{
max-width:900px;
margin:auto;
padding:30px;
background:white;
text-align:center;
}

/* Upload Box */

.upload-box{
border:3px dashed #9aa4d6;
padding:60px;
margin-top:30px;
}

.upload-btn{
background:#198754;
color:white;
border:none;
padding:12px 30px;
font-size:16px;
cursor:pointer;
border-radius:5px;
margin-top:15px;
}

</style>

</head>

<body>

<div class="header">
i10 IMAGE TOOL
</div>

<div class="container">

<h1>Make Passport Size Photo</h1>

<div class="upload-box">

<p>Select Or Drag & Drop Image Here</p>

<input type="file" id="imageInput" hidden>

<button class="upload-btn"
onclick="document.getElementById('imageInput').click()">

Select Image

</button>

</div>

</div>

</body>

</html>
