<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Passport Photo Maker - i10 Image Tools</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f4f8;
}

.header{
background:#2d5cff;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.menu{
font-size:26px;
cursor:pointer;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.title{
font-size:30px;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:30px;
}

.upload-box{
border:3px dashed #3c4ed8;
background:white;
padding:60px 20px;
border-radius:8px;
}

.upload-box p{
color:#777;
font-size:16px;
margin-bottom:20px;
}

.upload-btn{
background:#1abc9c;
border:none;
padding:12px 28px;
color:white;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

.upload-btn:hover{
background:#16a085;
}

.size-panel{
display:none;
margin-top:40px;
background:white;
padding:25px;
border-radius:8px;
}

.size-option{
border:1px solid #ddd;
padding:12px;
margin:10px 0;
cursor:pointer;
border-radius:5px;
}

.size-option:hover{
background:#f1f1f1;
}

.custom-box{
margin-top:20px;
display:none;
}

input{
padding:8px;
margin:5px;
}

</style>

</head>


<body>


<div class="header">

<div>i10 IMAGE TOOLS</div>

<div class="menu">☰</div>

</div>


<div class="container">

<div class="title">Make Passport Size Photo</div>

<div class="subtitle">
Welcome to i10 Image Tools - Your Reliable Solution for Passport Size Images!
</div>


<div class="upload-box">

<p>Select Or Drag & Drop Image Here</p>

<input type="file" id="imageInput" accept="image/*" hidden>

<button class="upload-btn" onclick="document.getElementById('imageInput').click()">
Select Image
</button>

</div>


<div class="size-panel" id="sizePanel">

<h3>Select Passport Size</h3>

<div class="size-option">35 × 45 mm (India / UK / Europe)</div>

<div class="size-option">2 × 2 inch (USA)</div>

<div class="size-option">50 × 70 mm (Canada)</div>

<div class="size-option" onclick="showCustom()">Custom Size</div>


<div class="custom-box" id="customBox">

<input type="number" placeholder="Width">

<input type="number" placeholder="Height">

<select>
<option>MM</option>
<option>CM</option>
<option>INCH</option>
<option>PX</option>
</select>

<br><br>

<label>DPI</label>

<input type="number" value="300">

</div>

</div>

</div>


<script>

let imageInput=document.getElementById("imageInput");

let sizePanel=document.getElementById("sizePanel");

imageInput.addEventListener("change",function(){

let file=this.files[0];

if(file){

sizePanel.style.display="block";

}

});

function showCustom(){

document.getElementById("customBox").style.display="block";

}

</script>


</body>

</html>
