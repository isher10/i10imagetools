<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Passport Photo Maker - i10 Image Tools</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#2c3e90;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.step-box{
background:white;
border:2px solid #2c3e90;
padding:30px;
text-align:center;
}

.drop-area{
border:2px dashed #2c3e90;
padding:40px;
margin-top:20px;
}

button{
background:#2c3e90;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:black;
}

</style>

</head>
<body>

<header>
i10 IMAGE TOOLS
</header>

<div class="container">

<div class="step-box">

<h2>Make Passport Size Photo</h2>

<p>Select Or Drag & Drop Image Here</p>

<div class="drop-area">

<input type="file" id="imageInput" accept="image/*">

<br>

<button onclick="uploadImage()">Select Image</button>

</div>

</div>

</div>

<script>

function uploadImage(){

let file=document.getElementById("imageInput").files[0]

if(!file){

alert("Please select image")

return

}

localStorage.setItem("passportImage",URL.createObjectURL(file))

window.location.href="passport-size.html"

}

</script>

</body>
</html>
